dragons:
  ender_dragon:
    id: "ender_dragon"
    display-name: "Дракон Края"
    type: "NORMAL"
    enabled: true
    health: 400.0
    damage: 12.0
    armor: 0.0
    knockback-resistance: 1.0
    follow-range: 100
    movement-speed: 0.25
    flying-speed: 0.4
    abilities:
      - "DRAGON_BREATH"
      - "CHARGE"
      - "SUMMON_ENDERMITE"
      - "PHASE_SHIFT"
    phases:
      - threshold: 1.0
        abilities:
          - "CHARGE"
          - "DRAGON_BREATH"
      - threshold: 0.6
        abilities:
          - "CHARGE"
          - "DRAGON_BREATH"
          - "SUMMON_ENDERMITE"
