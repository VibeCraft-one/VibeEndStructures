  boss-bar-color: "PURPLE"
  boss-bar-style: "PROGRESS"
  announce-spawn: true
  announce-death: true
  death-message: "&d&lДракон %dragon% &r&7побежден! Топ-урон: %top_player% (%top_dmg%)"
  spawn-message: "&d&lДракон %dragon% &r&7пробудился на арене &b%arena%&7!"